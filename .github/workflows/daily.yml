name: Daily Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r dashboard_generator/requirements.txt

      - name: Run pipeline
        working-directory: dashboard_generator
        env:
          XQUIK_API_KEY: ${{ secrets.XQUIK_API_KEY }}
        run: python pipeline.py --days 3
        continue-on-error: true

      - name: Build site
        run: python dashboard_generator/build_site.py

      - name: Verify dashboard exists
        run: |
          if [ ! -s site/index.html ]; then
            echo "ERROR: site/index.html is missing or empty"
            exit 1
          fi
          # Fail if only the placeholder is present after a real run
          if grep -q "PLACEHOLDER_BUILD_PENDING" site/index.html; then
            echo "ERROR: pipeline did not produce a dashboard; placeholder still in place"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
